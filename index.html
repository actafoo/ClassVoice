<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassVoice — 수업 칭찬 추적기</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>ClassVoice</h1>
    <p>수업 중 칭찬 학생 추적 &amp; 포인트 자동 부여</p>
  </div>

  <!-- ═══════════════ 설정 화면 ═══════════════ -->
  <div id="screen-settings" class="screen active">
    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" data-tab="tab-config">설정</button>
        <button class="tab-btn" data-tab="tab-students">학생 명단</button>
      </div>

      <!-- 설정 탭 (LLM + 포인트 API 통합) -->
      <div id="tab-config" class="tab-panel active">
        <div class="card-title" style="margin-bottom:10px">LLM 설정</div>
        <div class="form-group">
          <label for="llm-provider">LLM 제공사</label>
          <select id="llm-provider">
            <option value="anthropic">Anthropic Claude (claude-haiku-4-5)</option>
            <option value="openai">OpenAI (gpt-4o-mini)</option>
            <option value="gemini">Google Gemini (gemini-2.0-flash)</option>
            <option value="upstage">Upstage Solar (solar-pro)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="llm-api-key">LLM API 키</label>
          <div class="key-wrap">
            <input type="password" id="llm-api-key" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
            <button class="eye-btn" data-target="llm-api-key" type="button" title="보기/숨기기">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div style="height:12px"></div>
        <div class="card-title" style="margin-bottom:10px">포인트 API 설정</div>
        <div class="form-group">
          <label for="points-api-key">포인트 API 키</label>
          <div class="key-wrap">
            <input type="password" id="points-api-key" placeholder="API 키를 입력하세요" autocomplete="off" spellcheck="false">
            <button class="eye-btn" data-target="points-api-key" type="button" title="보기/숨기기">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label for="class-id">클래스 ID</label>
          <input type="text" id="class-id" placeholder="예: 12345">
        </div>
        <div class="row">
          <div class="form-group">
            <label for="points-per-praise">칭찬 1회 포인트</label>
            <input type="number" id="points-per-praise" value="10" min="1" max="9999">
          </div>
          <div class="form-group">
            <label for="points-description">포인트 설명</label>
            <input type="text" id="points-description" value="수업 중 칭찬">
          </div>
        </div>
      </div>

      <!-- 학생 명단 탭 -->
      <div id="tab-students" class="tab-panel">
        <div class="form-group">
          <label for="student-list">학생 명단</label>
          <textarea id="student-list" placeholder="1 김지수&#10;2 이민준&#10;3 박서연&#10;(출석번호 이름 형식, 줄바꿈으로 구분)"></textarea>
          <div class="hint">출석번호와 이름을 공백으로 구분하여 한 줄씩 입력하세요.</div>
        </div>
        <div id="student-preview" class="student-preview"></div>
      </div>
    </div>

    <button class="btn btn-primary btn-full btn-xl" id="btn-start-class">수업 시작</button>
  </div>

  <!-- ═══════════════ 수업(녹음) 화면 ═══════════════ -->
  <div id="screen-recording" class="screen">
    <div class="card">
      <div class="record-center">
        <div class="record-btn-wrap">
          <button id="btn-record">녹음<br>시작</button>
          <div class="rec-dot" id="rec-dot"></div>
        </div>
        <div class="timer-section">
          <div class="timer-display" id="timer-display">00:00</div>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progress-bar"></div>
          </div>
          <div class="timer-label">40분 기준 진행률</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">음성 인식 로그</div>
      <div class="transcript-box" id="transcript-log">
        <span class="transcript-empty">녹음을 시작하면 인식된 텍스트가 여기에 표시됩니다.</span>
      </div>
    </div>
    <div class="divider"></div>
    <button class="btn btn-danger btn-full" id="btn-end-class">수업 종료 &amp; 분석</button>
    <div style="margin-top:10px">
      <button class="btn btn-ghost btn-full" id="btn-back-settings">← 설정으로</button>
    </div>
  </div>

  <!-- ═══════════════ 결과 화면 ═══════════════ -->
  <div id="screen-results" class="screen">
    <div class="card result-header">
      <h2 id="result-title">칭찬 학생 분석 결과</h2>
      <p id="result-subtitle"></p>
    </div>
    <div class="card">
      <div class="master-check">
        <input type="checkbox" id="check-all">
        <label for="check-all" style="cursor:pointer">전체 선택 / 해제</label>
      </div>
      <div class="praised-list" id="praised-list"></div>
      <div class="give-points-section">
        <button class="btn btn-success btn-full" id="btn-give-points">선택한 학생 포인트 부여</button>
        <button class="btn btn-ghost btn-full" id="btn-restart">다시 시작</button>
      </div>
    </div>
  </div>
</div>

<!-- Loading -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">LLM으로 분석 중...</div>
</div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
